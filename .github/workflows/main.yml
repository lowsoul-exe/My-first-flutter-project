name: Flutter Web Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write  # ✅ necesar pentru push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable  # ✅ specifică canalul

      - run: flutter build web --release --base-href /My-first-flutter-project/

      - run: git config user.name github-actions
      - run: git config user.email github-actions@github.com

      - run: git --work-tree build/web --git-dir=.git add --all  # ✅ adăugat --git-dir

      - run: git commit -m "Automatic deployment by github-actions"

      # ✅ push cu token de autentificare
      - run: git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:gh-pages --force
